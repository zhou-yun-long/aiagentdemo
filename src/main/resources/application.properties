spring.application.name=AiAgentDemo

#
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:glm-4.6}
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:embedding-3}
spring.ai.openai.embedding.embeddings-path=/embeddings
spring.ai.openai.chat.completions-path=/chat/completions

# Rerank ????
rag.enabled=${RAG_ENABLED:true}
rag.rerank.path=/rerank
rag.rerank.model=rerank

