# MCP Server ??
spring.ai.mcp.server.name=AiAgentDemo-MCP-Server
spring.ai.mcp.server.version=1.0.0

# H2 file database (persisted to ./data/treeify)
spring.datasource.url=jdbc:h2:file:./data/treeify;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Treeify generation mode: mock (template-based), ai (LLM-orchestrated), auto (ai if API key set, else mock)
treeify.generation.mode=${TREEIFY_GENERATION_MODE:auto}
